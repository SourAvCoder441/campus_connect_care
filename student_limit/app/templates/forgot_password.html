<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>Campus Connect-Care</h1>
    <h2>Reset Password</h2>

    <!-- STEP 1: SEND OTP -->
    <form method="POST">
        <input
            type="email"
            name="email"
            placeholder="Registered College Email"
            required
        >

        {% if not otp_sent %}
            <button type="submit" name="action" value="send_otp">
                Send OTP
            </button>
        {% endif %}

        <!-- STEP 2: VERIFY OTP -->
        {% if otp_sent %}
            <input
                type="text"
                name="otp"
                placeholder="Enter OTP"
                required
            >

            <button type="submit" name="action" value="verify_otp">
                Verify OTP
            </button>
        {% endif %}
    </form>

    <p class="link">
        Back to
        <a href="{{ url_for('student.login') }}">Login</a>
    </p>
</div>

</body>
</html>
